name: Build Pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]
env:
  NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
  TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
  NEXT_PUBLIC_TINA_BRANCH: ${{ github.head_ref }}
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build sample
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        # Retries because TinaCloud indexes the pushed schema asynchronously via webhook,
        # so the remote index can briefly lag behind the branch that was just pushed.
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=1
          until pnpm build; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "❌ Build failed after $ATTEMPT attempts"
              exit 1
            fi
            echo "⚠️ Build failed, possibly because TinaCloud is still indexing the updated schema. Retrying in 30s (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
          done