name: Update TinaCMS Dependencies
on:
  push:
    branches:
      - dependabot/npm_and_yarn/**

# Workflows triggered by a Dependabot push get a read-only GITHUB_TOKEN and no access to
# Actions secrets (GitHub treats them like fork PRs). This job intentionally has no write
# permissions - it only builds the update and hands off a patch via workflow_run to
# commit-tinacms-update.yml, which runs unrestricted and does the actual push.
permissions:
  contents: read

jobs:
  update-tinacms:
    runs-on: ubuntu-latest
    steps:
      # Clone repo
      - name: Check out repo to update
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Install deps, update Tina packages, update schema
      - name: Install dependencies
        run: pnpm install
      - name: Update Tina packages
        run: |
          pnpm update tinacms@latest
          pnpm update -D @tinacms/cli@latest
      - name: Update Schema
        run: pnpm exec tinacms audit
      # tina/tina-lock.json is only regenerated by "tinacms dev", never by "tinacms build"
      # or "tinacms audit". Without this, bumping tinacms/@tinacms/cli here leaves the lock
      # file stale, so TinaCloud's remote schema check fails on every future build with
      # "local schema doesn't match remote schema" until someone runs dev locally and pushes it.
      - name: Regenerate tina-lock.json
        run: timeout 90 pnpm exec tinacms dev --noWatch || true
      # Package the changes as a patch instead of committing directly - this job has no
      # write access, so the commit happens in the privileged workflow_run job below.
      - name: Create patch of changes
        run: |
          git diff --binary > tinacms-update.patch
          echo "Patch size: $(wc -l < tinacms-update.patch) lines"
      - name: Upload patch
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: tinacms-update-patch
          path: tinacms-update.patch
          retention-days: 1
