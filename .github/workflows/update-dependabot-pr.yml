name: Update TinaCMS Dependencies
on:
  push:
    branches:
      - dependabot/npm_and_yarn/**

permissions:
  contents: write

jobs:
  update-tinacms:
    runs-on: ubuntu-latest
    steps:
      # Clone repo
      - name: Check out repo to update
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Install deps, update Tina packages, update schema
      - name: Install dependencies
        run: pnpm install
      - name: Update Tina packages
        run: |
          pnpm update tinacms@latest
          pnpm update -D @tinacms/cli@latest
      - name: Update Schema
        run: pnpm exec tinacms audit
      # tina/tina-lock.json is only regenerated by "tinacms dev", never by "tinacms build"
      # or "tinacms audit". Without this, bumping tinacms/@tinacms/cli here leaves the lock
      # file stale, so TinaCloud's remote schema check fails on every future build with
      # "local schema doesn't match remote schema" until someone runs dev locally and pushes it.
      - name: Regenerate tina-lock.json
        run: timeout 90 pnpm exec tinacms dev --noWatch || true
      # Commit changes
      - name: Commit changes back to branch
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update TinaCMS generated files"
          committer_name: GitHub Actions
          committer_email: actions@github.com
